version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eam-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: eam_inspection
      MYSQL_USER: eam_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eam_pass_2024}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - eam-network
    healthcheck:
      test: mysqladmin ping -h localhost
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eam-redis
    restart: always
    environment:
      TZ: Asia/Shanghai
    volumes:
      - redis_data:/data
    networks:
      - eam-network
    healthcheck:
      test: redis-cli ping
      interval: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eam-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    networks:
      - eam-network
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  nginx:
    image: nginx:alpine
    container_name: eam-nginx
    restart: always
    depends_on:
      - backend
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - uploads_data:/static/uploads:ro
      - ./frontend-pc/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - eam-network

volumes:
  mysql_data:
  redis_data:
  uploads_data:

networks:
  eam-network:
    driver: bridge