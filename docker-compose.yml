version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: eam-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: eam_inspection
      MYSQL_USER: ${MYSQL_USER:-eam_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-eam_pass_2024}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    networks:
      - eam-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eam-redis
    restart: always
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - eam-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eam-fastapi
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    networks:
      - eam-network

  nginx:
    image: nginx:alpine
    container_name: eam-nginx
    restart: always
    depends_on:
      - fastapi
    environment:
      TZ: Asia/Shanghai
    ports:
      - "80:80"
    volumes:
      - ./backend/uploads:/static/uploads
      - ./frontend-pc/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - eam-network

networks:
  eam-network:
    driver: bridge